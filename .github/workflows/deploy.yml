name: Deploy Next.js App

on:
  push:
    branches:
      - main # یا شاخه‌ای که می‌خواهید دیپلوی کنید

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # یا نسخه مورد نیاز شما، مثلا '20.18.1'

      - name: Install Dependencies and Build
        run: |
          npm install
          npm run build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # اطمینان از فعال بودن NVM و انتخاب نسخه درست Node.js
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 20 --latest # نصب آخرین نسخه 20.x اگر موجود نیست و سوئیچ به آن
            nvm use 20
            node -v # برای اطمینان از نسخه صحیح

            # رفتن به پوشه پروژه در سرور
            cd /root/iranhtp-frontend # مطمئن شوید این مسیر صحیح است

            # نصب پکیج‌ها (اگر لازم است، ممکن است کپی شده باشند)
            # npm install

            # اجرای بیلد (اگر لازم است، معمولا در محیط CI بیلد شده)
            # npm run build

            # ریستارت کردن برنامه با PM2
            # اطمینان از نصب بودن pm2
            if ! command -v pm2 &> /dev/null
            then
                echo "pm2 could not be found, installing globally..."
                npm install pm2 -g
            fi
            pm2 restart iranhtp-frontend || pm2 start npm --name "iranhtp-frontend" -- start --no-daemon
