name: Deploy to server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "."
          # مسیر مقصد در سرور - مطمئن شوید این پوشه وجود دارد
          target: "/root/iranhtp-frontend"

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # رفتن به پوشه پروژه
            cd /root/iranhtp-frontend

            # اجرای دستورات بیلد و ریستارت
            # این دستورات را با توجه به نیاز پروژه خودتان تنظیم کنید
            # مثال برای Next.js:
            npm install
            npm run build
            # برای اجرای برنامه (مثلا با pm2)
            # ابتدا مطمئن شوید pm2 نصب است: npm install pm2 -g
            # سپس برنامه را ریستارت کنید:
            pm2 restart iranhtp-frontend || pm2 start npm --name "iranhtp-frontend" -- start
